<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Arcline{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:        #080c18;
      --navy2:       #0d1428;
      --navy3:       #111c38;
      --indigo:      #4f62e8;
      --indigo2:     #6b7df5;
      --indigo-glow: rgba(79,98,232,0.25);
      --purple:      #7c5cbf;
      --glass-bg:    rgba(255,255,255,0.04);
      --glass-border:rgba(255,255,255,0.09);
      --glass-hover: rgba(255,255,255,0.07);
      --text-primary:#f0f2ff;
      --text-secondary:#8892b0;
      --text-dim:    #4a5568;
      --green:       #34d399;
      --red:         #f87171;
      --amber:       #fbbf24;
      --radius:      16px;
      --radius-sm:   10px;
      --sidebar-w:   260px;
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--text-primary); overflow-x: hidden; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }

    /* ── LAYOUT ── */
    .app-shell { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: rgba(8,12,24,0.85);
      backdrop-filter: blur(24px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform .3s ease;
    }

    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 4px 8px 24px;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 8px;
    }
    .logo-mark {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--indigo), var(--purple));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 18px; height: 18px; }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }

    .client-badge {
      margin: 8px 0 16px;
      padding: 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      color: var(--text-secondary);
    }
    .client-badge strong { display: block; color: var(--text-primary); font-size: 14px; margin-bottom: 2px; }

    .nav-section { flex: 1; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 1.2px; color: var(--text-dim); text-transform: uppercase; padding: 0 8px; margin: 16px 0 6px; }
    .nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all .2s;
      margin-bottom: 2px;
    }
    .nav-link:hover { background: var(--glass-hover); color: var(--text-primary); }
    .nav-link.active { background: rgba(79,98,232,0.15); color: var(--indigo2); border: 1px solid rgba(79,98,232,0.2); }
    .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }

    .receptionist-btn {
      margin: 16px 0;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--green);
      background: rgba(52,211,153,0.08);
      color: var(--green);
      font-size: 13px; font-weight: 600;
      cursor: pointer; width: 100%;
      display: flex; align-items: center; gap: 8px;
      transition: all .2s;
      font-family: inherit;
    }
    .receptionist-btn.off {
      border-color: var(--red);
      background: rgba(248,113,113,0.08);
      color: var(--red);
    }
    .receptionist-btn:hover { opacity: .85; }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse-dot 2s infinite; }
    .receptionist-btn.off .rec-dot { background: var(--red); animation: none; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

    .sidebar-footer { border-top: 1px solid var(--glass-border); padding-top: 16px; }
    .user-info { padding: 10px 12px; font-size: 13px; color: var(--text-secondary); }
    .user-info strong { display: block; color: var(--text-primary); font-size: 14px; }
    .logout-link { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: var(--radius-sm); color: var(--text-dim); text-decoration: none; font-size: 13px; transition: all .2s; margin-top: 4px; }
    .logout-link:hover { background: var(--glass-hover); color: var(--red); }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 32px 36px; min-height: 100vh; }

    /* ── GLASS CARD ── */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      transition: border-color .2s;
    }
    .glass:hover { border-color: rgba(255,255,255,0.13); }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .page-header p  { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }

    /* ── STAT CARDS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { padding: 24px; }
    .stat-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); letter-spacing: .5px; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
    .stat-sub   { font-size: 12px; color: var(--text-secondary); margin-top: 8px; }
    .stat-delta { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 20px; margin-top: 8px; }
    .delta-up   { background: rgba(52,211,153,0.12); color: var(--green); }
    .delta-down { background: rgba(248,113,113,0.12); color: var(--red); }

    /* ── FILTER BAR ── */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
    .filter-btn {
      padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--glass-border); background: var(--glass-bg);
      color: var(--text-secondary); cursor: pointer; font-family: inherit;
      transition: all .15s;
    }
    .filter-btn:hover { background: var(--glass-hover); color: var(--text-primary); }
    .filter-btn.active { background: rgba(79,98,232,0.2); border-color: var(--indigo); color: var(--indigo2); }

    /* ── CHART ── */
    .chart-card { padding: 24px; margin-bottom: 24px; }
    .chart-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .chart-card p  { font-size: 12px; color: var(--text-secondary); margin-bottom: 20px; }
    .chart-wrap { height: 220px; position: relative; }

    /* ── SYSTEM STATUS ── */
    .status-card { padding: 28px; margin-bottom: 24px; }
    .status-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 20px; }
    .status-diagram { display: flex; align-items: center; justify-content: center; gap: 0; flex-wrap: wrap; }
    .status-node {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 20px 24px;
      background: rgba(79,98,232,0.08);
      border: 1px solid rgba(79,98,232,0.25);
      border-radius: var(--radius);
      min-width: 120px; text-align: center;
      transition: all .3s;
    }
    .status-node.offline { background: rgba(100,100,120,0.08); border-color: rgba(100,100,120,0.2); opacity: .5; }
    .node-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(79,98,232,0.2); }
    .node-icon svg { width: 20px; height: 20px; }
    .node-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
    .node-status { font-size: 10px; color: var(--green); font-weight: 500; }
    .node-status.off { color: var(--text-dim); }
    .status-line { flex: 1; min-width: 40px; max-width: 80px; height: 2px; position: relative; overflow: hidden; }
    .status-line-inner { height: 100%; background: linear-gradient(90deg, transparent, var(--indigo2), transparent); background-size: 200% 100%; animation: flow 2s linear infinite; }
    .status-line.offline .status-line-inner { background: var(--text-dim); animation: none; }
    @keyframes flow { 0%{background-position:100%} 100%{background-position:-100%} }

    /* ── CALL LOG ── */
    .call-log-card { padding: 24px; }
    .call-log-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .call-table { width: 100%; border-collapse: collapse; }
    .call-table th { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .8px; padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--glass-border); }
    .call-table td { padding: 14px 12px; border-bottom: 1px solid var(--glass-border); font-size: 13px; color: var(--text-secondary); vertical-align: top; }
    .call-table tr:last-child td { border-bottom: none; }
    .call-table tr:hover td { background: var(--glass-hover); }
    .outcome-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-booked     { background: rgba(52,211,153,0.12); color: var(--green); }
    .badge-question   { background: rgba(79,98,232,0.12);  color: var(--indigo2); }
    .badge-transferred{ background: rgba(251,191,36,0.12); color: var(--amber); }
    .badge-ooh        { background: rgba(124,92,191,0.15); color: #a78bda; }
    .badge-cancelled  { background: rgba(248,113,113,0.12);color: var(--red); }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--navy2); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 32px; max-width: 420px; width: 90%; animation: modal-in .2s ease; }
    @keyframes modal-in { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .modal p  { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; transition: all .15s; }
    .btn-ghost { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-secondary); }
    .btn-ghost:hover { background: var(--glass-hover); color: var(--text-primary); }
    .btn-danger { background: rgba(248,113,113,0.15); border: 1px solid var(--red); color: var(--red); }
    .btn-danger:hover { background: rgba(248,113,113,0.25); }
    .btn-primary { background: var(--indigo); color: #fff; }
    .btn-primary:hover { background: var(--indigo2); }
    .btn-success { background: rgba(52,211,153,0.15); border: 1px solid var(--green); color: var(--green); }
    .btn-success:hover { background: rgba(52,211,153,0.25); }

    /* ── ADMIN ── */
    .admin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 28px; }
    .admin-stat { padding: 20px 24px; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: .8px; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--glass-border); }
    .admin-table td { padding: 14px 16px; border-bottom: 1px solid var(--glass-border); font-size: 13px; color: var(--text-secondary); }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--glass-hover); }
    .status-pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .pill-active  { background: rgba(52,211,153,0.12); color: var(--green); }
    .pill-paused  { background: rgba(248,113,113,0.12); color: var(--red); }
    .pill-paid    { background: rgba(52,211,153,0.12); color: var(--green); }
    .pill-pending { background: rgba(251,191,36,0.12);  color: var(--amber); }
    .pill-overdue { background: rgba(248,113,113,0.12); color: var(--red); }

    /* ── FORM ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1/-1; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .form-control {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      color: var(--text-primary); border-radius: 8px; padding: 10px 14px;
      font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s;
    }
    .form-control:focus { border-color: var(--indigo); }
    select.form-control option { background: var(--navy2); }

    /* ── LOGIN ── */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); position: relative; overflow: hidden; }
    .login-glow { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: var(--indigo-glow); filter: blur(120px); top: -100px; left: 50%; transform: translateX(-50%); pointer-events: none; }
    .login-card { width: 380px; padding: 40px; position: relative; z-index: 1; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .logo-text { font-size: 22px; font-weight: 700; }
    .login-logo p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    .login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .login-sub   { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }
    .login-error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
    .login-hint  { margin-top: 20px; padding: 14px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; font-size: 12px; color: var(--text-secondary); font-family: 'DM Mono', monospace; line-height: 1.8; }

    /* ── FLASH ── */
    .flash { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
    .flash-success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--green); }

    /* ── PAYMENTS ── */
    .payments-hero { padding: 28px; margin-bottom: 24px; }
    .payments-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 8px; }
    .pay-stat { }
    .pay-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
    .pay-value { font-size: 26px; font-weight: 700; letter-spacing: -1px; }

    /* ── MOBILE ── */
    .hamburger { display: none; position: fixed; top: 16px; right: 16px; z-index: 200; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 8px; padding: 8px; cursor: pointer; }
    .hamburger svg { width: 20px; height: 20px; color: var(--text-primary); }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }

    @media (max-width: 900px) {
      .stats-grid { grid-template-columns: repeat(2,1fr); }
      .admin-grid  { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 768px) {
      .hamburger { display: block; }
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { margin-left: 0; padding: 24px 16px 80px; }
      .stats-grid { grid-template-columns: repeat(2,1fr); }
      .form-grid  { grid-template-columns: 1fr; }
      .admin-grid { grid-template-columns: 1fr 1fr; }
      .login-card { width: 95%; padding: 28px 20px; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
    }

    /* ── ANIMATIONS ── */
    .fade-in { animation: fadeIn .4s ease both; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-in-1 { animation-delay: .05s; }
    .fade-in-2 { animation-delay: .1s; }
    .fade-in-3 { animation-delay: .15s; }
    .fade-in-4 { animation-delay: .2s; }
    .fade-in-5 { animation-delay: .25s; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
